# =============================================================
# OLAP-Tuned PostgreSQL Configuration for Sales Data Warehouse
# =============================================================

# --- Connection ---
listen_addresses = '*'
max_connections = 20

# --- Memory (tuned for analytical workloads) ---
shared_buffers = '256MB'
work_mem = '64MB'
maintenance_work_mem = '128MB'
effective_cache_size = '512MB'

# --- Parallel Query (use multiple cores for big scans) ---
max_parallel_workers_per_gather = 4
max_parallel_workers = 8
max_worker_processes = 8
parallel_tuple_cost = 0.01
parallel_setup_cost = 100

# --- WAL (relaxed for bulk loads) ---
wal_level = 'replica'
max_wal_size = '1GB'
checkpoint_completion_target = 0.9

# --- Planner (favor sequential scans for OLAP) ---
random_page_cost = 1.1
effective_io_concurrency = 200
seq_page_cost = 1.0

# --- Logging ---
log_min_duration_statement = 500
log_statement = 'ddl'

# --- TimescaleDB ---
shared_preload_libraries = 'timescaledb'
timescaledb.telemetry_level = 'off'
